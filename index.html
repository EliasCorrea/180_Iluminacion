<html>

    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
        <style>
            #light-panel {
                position: fixed;
                top: 10px;
                right: 10px;
                background: rgba(0, 0, 0, 0.75);
                color: white;
                padding: 12px 16px;
                border-radius: 10px;
                z-index: 9999;
                font-family: sans-serif;
                font-size: 13px;
                width: 240px;
                backdrop-filter: blur(6px);
            }
            #light-panel h3 {
                margin: 0 0 10px;
                font-size: 14px;
                font-weight: 600;
                border-bottom: 1px solid rgba(255,255,255,0.2);
                padding-bottom: 6px;
            }
            #light-panel .tabs {
                display: flex;
                gap: 6px;
                margin-bottom: 10px;
            }
            #light-panel .tab {
                flex: 1;
                padding: 4px;
                background: rgba(255,255,255,0.1);
                border: none;
                border-radius: 6px;
                color: white;
                cursor: pointer;
                font-size: 12px;
            }
            #light-panel .tab.active {
                background: rgba(255,255,255,0.35);
                font-weight: 600;
            }
            #light-panel .row {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin-bottom: 7px;
                gap: 8px;
            }
            #light-panel label {
                min-width: 70px;
                font-size: 12px;
                color: rgba(255,255,255,0.75);
            }
            #light-panel input[type=range] {
                flex: 1;
                accent-color: #fff;
            }
            #light-panel input[type=color] {
                width: 32px;
                height: 24px;
                border: none;
                border-radius: 4px;
                cursor: pointer;
                padding: 0;
                background: none;
            }
            #light-panel .val {
                min-width: 32px;
                text-align: right;
                font-size: 11px;
                color: rgba(255,255,255,0.6);
            }
        </style>
    </head>

    <body>
        <a-scene mindar-image="imageTargetSrc: ./targets_180.mind;
                        missTolerance: 0;
                        filterMinCF: 0.001;
                        filterBeta: 0.01;
                        warmupTolerance: 5"
            vr-mode-ui="enabled: false"
            color-space="sRGB"
            device-orientation-permission-ui="enabled: false"
            renderer="colorManagement: true"
            light="defaultLightsEnabled: false">

            <a-assets>
                <a-asset-item id="primerLamparaDePieModel"
                    src="https://raw.githubusercontent.com/EliasCorrea/180_Iluminacion/refs/heads/main/models/LamparaCoritita/lamparaDePie2.glb"></a-asset-item>
                <a-asset-item id="segundaLamparaDePieModel"
                    src="https://raw.githubusercontent.com/EliasCorrea/180_Iluminacion/refs/heads/main/models/LamaparaDePie/lamparaDePie.glb"></a-asset-item>
            </a-assets>

            <a-light type="ambient" color="#FFFFFF" intensity="1.0"></a-light>
            <a-light type="directional" color="#FFFFFF" intensity="0.8" position="1 2 1"></a-light>

            <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;"></a-camera>

            <a-entity mindar-image-target="targetIndex: 0">
                
                <a-light id="luz0" type="point" color="#FFF5E0" intensity="2" distance="0.5" decay="0" position="0.6 0.5 2.0"></a-light>
                <a-gltf-model rotation="0 90 90" position="0 0 0.1" scale="1.5 1.5 1.5" src="#primerLamparaDePieModel"></a-gltf-model>
                <a-text value="UMBRA " align="center" color="#1F1F1F" width="3" position="0 0.4 0"></a-text>
                <a-text value="CUERPO NEGRO - TULIPA SATINADA." align="center" color="#1F1F1F" width="1" position="0 -0.25 0"></a-text>
                <a-text value="TAMAÑO: 400X1580MM" align="center" color="#1F1F1F" width="1" position="0 -0.35 0"></a-text>
                
            </a-entity>

            <a-entity mindar-image-target="targetIndex: 1">

                <a-light id="luz1" type="point" color="#FFF5E0" intensity="2" distance="0.5" decay="0" position="-0.10 3.0 2.0"></a-light>
                <a-gltf-model rotation="0 90 90" position="0 0 0.1" scale="1.5 1.5 1.5" src="#segundaLamparaDePieModel"></a-gltf-model>
                <a-text value="LUCIANO " align="center" color="#EBEBEB" width="3" position="0 0.4 0"></a-text>
                <a-text value="CUERPO NEGRO - TULIPA SATINADA." align="center" color="#EBEBEB" width="1" position="0 -0.25 0"></a-text>
                <a-text value="TAMAÑO:D250mm x H1650mm (ø300mm Tulipa)" align="center" color="#EBEBEB" width="1" position="0 -0.35 0"></a-text>

            </a-entity>

        </a-scene>

        <!-- Panel flotante -->
        <div id="light-panel">
            <h3>Configuracion de Iluminacion</h3>

            <div class="tabs">
                <button class="tab active" onclick="setTarget(0, this)">Lampara UMBRA</button>
                <button class="tab" onclick="setTarget(1, this)">Lampara LUCIANO</button>
            </div>

            <div class="row">
                <label>Color</label>
                <input type="color" id="ctrl-color" value="#fff5e0" oninput="applyLight()">
                <span class="val" id="val-color">#fff5e0</span>
            </div>
            <div class="row">
                <label>Dimmer</label>
                <input type="range" id="ctrl-intensity" min="0" max="5" step="0.1" value="2" oninput="applyLight()">
                <span class="val" id="val-intensity">2.0</span>
            </div>
        </div>

        <script>
            let currentTarget = 0;

            // Valores fijos por entidad
            const fixedParams = {
                0: { distance: 0.5, decay: 0.0, px: 0.6,   py: 0.5, pz: 2.0 },
                1: { distance: 0.5, decay: 0.0, px: -0.10, py: 3.0, pz: 2.0 }
            };

            // Estado de intensidad y color por entidad
            const lights = {
                0: { color: '#fff5e0', intensity: 3 },
                1: { color: '#fff5e0', intensity: 3 }
            };

            function setTarget(idx, btn) {
                saveState();
                currentTarget = idx;
                document.querySelectorAll('#light-panel .tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
                loadState();
            }

            function saveState() {
                lights[currentTarget] = {
                    color:     document.getElementById('ctrl-color').value,
                    intensity: parseFloat(document.getElementById('ctrl-intensity').value),
                };
            }

            function loadState() {
                const s = lights[currentTarget];
                document.getElementById('ctrl-color').value     = s.color;
                document.getElementById('ctrl-intensity').value = s.intensity;
                applyLight();
            }

            function applyLight() {
                const color     = document.getElementById('ctrl-color').value;
                const intensity = parseFloat(document.getElementById('ctrl-intensity').value);

                // Actualizar labels
                document.getElementById('val-color').textContent     = color;
                document.getElementById('val-intensity').textContent = intensity.toFixed(1);

                // Usar parámetros fijos de la entidad actual
                const fp = fixedParams[currentTarget];

                // Aplicar a la luz A-Frame en tiempo real
                const luz = document.getElementById('luz' + currentTarget);
                if (luz) {
                    luz.setAttribute('light', `type: point; color: ${color}; intensity: ${intensity}; distance: ${fp.distance}; decay: ${fp.decay}`);
                    luz.setAttribute('position', `${fp.px} ${fp.py} ${fp.pz}`);
                }

                saveState();
            }
        </script>
    </body>

</html>
